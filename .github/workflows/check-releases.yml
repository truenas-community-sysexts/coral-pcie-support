name: Check for New Releases

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

# Serialize manual dispatches against the scheduled run so two concurrent
# invocations cannot race on the commit/push of tracked-versions.json.
concurrency:
  group: check-releases
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      # Mint a short-lived token from sysext-ci-automation-app (in the
      # default-branch ruleset bypass list) to push tracked-versions.json back
      # to main; the default GITHUB_TOKEN's github-actions[bot] is not exempt.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      # -----------------------------------------------------------------------
      # Read current tracked state.
      # -----------------------------------------------------------------------
      - name: Read tracked versions
        id: tracked
        run: |
          set -o pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          with open('.github/tracked-versions.json') as f:
              s = json.load(f)
          print(f"truenas_version={s['truenas']['version']}")
          print(f"train={s['truenas']['train']}")
          print(f"gasket_driver={s['gasket']['driver']}")
          print(f"gasket_ref={s['gasket']['ref']}")
          print(f"gasket_repo={s['gasket'].get('repo', 'feranick/gasket-driver')}")
          PY

      # -----------------------------------------------------------------------
      # TrueNAS check: pick the latest stable scale-build tag, resolve its
      # train from the download.truenas.com listing, and gate on the matching
      # ISO actually being published. Tags can land hours or days before the
      # ISO; defer the bump rather than fail mid-build.
      # -----------------------------------------------------------------------
      - name: Check for new TrueNAS release
        id: truenas
        env:
          CURRENT_VERSION: ${{ steps.tracked.outputs.truenas_version }}
          CURRENT_TRAIN: ${{ steps.tracked.outputs.train }}
          # Public scale-build tag listing. Default GITHUB_TOKEN's 5000/hr
          # quota is plenty for these read-only API calls; the app token is
          # used only for the push to main and the build dispatch.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          echo "Currently tracked: ${CURRENT_VERSION} on train ${CURRENT_TRAIN}"

          if ! TAGS_JSON=$(curl -fsSL "https://api.github.com/repos/truenas/scale-build/tags?per_page=100" \
              -H "Authorization: Bearer ${GH_TOKEN}"); then
            echo "::error title=TrueNAS check::failed to fetch scale-build tags"
            exit 1
          fi

          # Stable tags are TS- followed by a purely-numeric dotted version
          # (e.g. TS-25.10.3, TS-25.10.3.1). Any non-numeric suffix
          # (BETA, RC, ALPHA, MASTER, ...) is a pre-release and excluded.
          LATEST_TAG=$(printf '%s' "$TAGS_JSON" | python3 -c "
          import sys, json, re
          tags = json.load(sys.stdin)
          stable_re = re.compile(r'^TS-(\d+(?:\.\d+)+)$')
          stable = [(m.group(1), t['name']) for t in tags
                    if (m := stable_re.match(t['name']))]
          if not stable:
              sys.exit(0)
          stable.sort(key=lambda v: [int(p) for p in v[0].split('.')])
          print(stable[-1][1])
          ")

          if [ -z "$LATEST_TAG" ]; then
            echo "::error title=TrueNAS check::no stable tags found in scale-build (parser likely broken)"
            exit 1
          fi

          LATEST_VERSION="${LATEST_TAG#TS-}"
          echo "Latest scale-build tag: ${LATEST_TAG} (version: ${LATEST_VERSION})"

          if [ "$LATEST_VERSION" = "$CURRENT_VERSION" ]; then
            echo "No new TrueNAS release"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Defense against tag deletions / numeric regressions.
          HIGHER=$(printf '%s\n%s\n' "$CURRENT_VERSION" "$LATEST_VERSION" | python3 -c "
          import sys
          versions = [line.strip() for line in sys.stdin if line.strip()]
          versions.sort(key=lambda v: [int(p) for p in v.split('.')])
          print(versions[-1])
          ")
          if [ "$HIGHER" != "$LATEST_VERSION" ]; then
            echo "Latest tag ${LATEST_VERSION} is not higher than tracked ${CURRENT_VERSION} -- ignoring"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Resolve train name from the download.truenas.com listing.
          if ! LISTING=$(curl -fsSL "https://download.truenas.com/"); then
            echo "::error title=TrueNAS check::failed to fetch download.truenas.com listing"
            exit 1
          fi

          TRAIN_COUNT=$(printf '%s' "$LISTING" | python3 -c "
          import sys, re
          trains = sorted(set(re.findall(r'TrueNAS-SCALE-([A-Z][a-zA-Z]+)/', sys.stdin.read())))
          print(len(trains))
          ")
          # download.truenas.com historically lists 3+ trains (Angelfish, Cobia,
          # Dragonfish, Electric Eel, Fangtooth, Goldeye, ...). Fewer than 3
          # means the page is truncated, rate-limited, or the HTML changed.
          if [ "$TRAIN_COUNT" -lt 3 ]; then
            echo "::error title=TrueNAS check::download.truenas.com listing has only ${TRAIN_COUNT} train references -- looks broken or rate-limited"
            exit 1
          fi

          MATCHED_TRAINS=$(printf '%s' "$LISTING" | LATEST_VERSION="$LATEST_VERSION" python3 -c "
          import sys, os, re
          version = os.environ['LATEST_VERSION']
          listing = sys.stdin.read()
          pattern = re.compile(r'TrueNAS-SCALE-([A-Z][a-zA-Z]+)/' + re.escape(version) + r'/')
          for t in sorted(set(pattern.findall(listing))):
              print(t)
          ")

          NUM_MATCHES=$(printf '%s' "$MATCHED_TRAINS" | python3 -c "
          import sys
          print(sum(1 for line in sys.stdin if line.strip()))
          ")

          if [ "$NUM_MATCHES" -eq 0 ]; then
            echo "Tag ${LATEST_VERSION} found in scale-build, but not yet listed on download.truenas.com under any train. Will retry on next scheduled run."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$NUM_MATCHES" -gt 1 ]; then
            echo "::error title=TrueNAS check::version ${LATEST_VERSION} appears under multiple trains -- refusing to guess"
            echo "Matched trains:" >&2
            printf '%s' "$MATCHED_TRAINS" | sed 's/^/  /' >&2
            exit 1
          fi

          NEW_TRAIN=$(printf '%s' "$MATCHED_TRAINS" | python3 -c "
          import sys
          for line in sys.stdin:
              s = line.strip()
              if s:
                  print(s)
                  break
          ")
          echo "Resolved train for ${LATEST_VERSION}: ${NEW_TRAIN}"

          # ISO-file gate: the directory exists, but the ISO itself may still
          # be uploading. HEAD-check the actual file URL.
          ISO_URL="https://download.truenas.com/TrueNAS-SCALE-${NEW_TRAIN}/${LATEST_VERSION}/TrueNAS-SCALE-${LATEST_VERSION}.iso"
          if ! curl -fsI "$ISO_URL" >/dev/null 2>&1; then
            echo "ISO not yet published at ${ISO_URL}. Will retry on next scheduled run."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$NEW_TRAIN" != "$CURRENT_TRAIN" ]; then
            echo "::notice title=TrueNAS train rollover::train moved from ${CURRENT_TRAIN} to ${NEW_TRAIN} (version ${LATEST_VERSION})"
          fi

          echo "New TrueNAS release detected, train resolved, ISO is published."
          {
            echo "changed=true"
            echo "version=${LATEST_VERSION}"
            echo "train=${NEW_TRAIN}"
          } >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Gasket check: look for new tags in feranick/gasket-driver. Unlike the
      # archived google/gasket-driver, feranick actively publishes kernel compat
      # releases (e.g. 1.0-18.2, 1.0-18.3, 1.0-18.4). Tags follow X.Y-Z.N
      # format. No consumer version gate (unlike hailo's Frigate pin): any
      # gasket release that builds is usable.
      # -----------------------------------------------------------------------
      - name: Check for new gasket-driver release
        id: gasket
        env:
          CURRENT_DRIVER: ${{ steps.tracked.outputs.gasket_driver }}
          GASKET_REPO: ${{ steps.tracked.outputs.gasket_repo }}
        run: |
          set -o pipefail
          echo "Currently tracked gasket driver: ${CURRENT_DRIVER} from ${GASKET_REPO}"

          if ! RELEASES_JSON=$(curl -fsSL "https://api.github.com/repos/${GASKET_REPO}/releases?per_page=50" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"); then
            echo "::error title=Gasket check::failed to fetch releases from ${GASKET_REPO}"
            exit 1
          fi

          LATEST=$(printf '%s' "$RELEASES_JSON" | python3 -c "
          import sys, json, re
          releases = json.load(sys.stdin)
          tag_re = re.compile(r'^v?(\d+\.\d+-\d+(?:\.\d+)*)$')
          candidates = []
          for r in releases:
              if r.get('draft') or r.get('prerelease'):
                  continue
              m = tag_re.match(r['tag_name'])
              if m:
                  version = m.group(1)
                  parts = [int(x) for x in version.replace('-', '.').split('.')]
                  candidates.append((parts, version, r['tag_name']))
          if candidates:
              candidates.sort(key=lambda c: c[0])
              print(f'{candidates[-1][1]}|{candidates[-1][2]}')
          ")

          if [ -z "$LATEST" ]; then
            echo "No matching releases found in ${GASKET_REPO}"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_VERSION="${LATEST%%|*}"
          LATEST_TAG="${LATEST##*|}"
          echo "Latest gasket release: ${LATEST_VERSION} (tag: ${LATEST_TAG})"

          if [ "$LATEST_VERSION" = "$CURRENT_DRIVER" ]; then
            echo "No new gasket-driver release"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Version comparison: normalize to dotted form for sorting
          HIGHER=$(printf '%s\n%s\n' "$CURRENT_DRIVER" "$LATEST_VERSION" | python3 -c "
          import sys
          versions = [line.strip() for line in sys.stdin if line.strip()]
          versions.sort(key=lambda v: [int(x) for x in v.replace('-', '.').split('.')])
          print(versions[-1])
          ")

          if [ "$HIGHER" != "$LATEST_VERSION" ]; then
            echo "Latest ${LATEST_VERSION} is not higher than tracked ${CURRENT_DRIVER}"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Newer gasket-driver release found: ${LATEST_VERSION} (tag: ${LATEST_TAG})"
          {
            echo "changed=true"
            echo "driver=${LATEST_VERSION}"
            echo "ref=${LATEST_TAG}"
          } >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # If either upstream moved, resolve the runner. When only gasket changed,
      # the TrueNAS version is unchanged so we use the current tracked values.
      # -----------------------------------------------------------------------
      - name: Resolve build runner
        id: runner
        if: steps.truenas.outputs.changed == 'true' || steps.gasket.outputs.changed == 'true'
        run: |
          if [ "${{ steps.truenas.outputs.changed }}" = "true" ]; then
            TRAIN="${{ steps.truenas.outputs.train }}"
            VERSION="${{ steps.truenas.outputs.version }}"
          else
            TRAIN="${{ steps.tracked.outputs.train }}"
            VERSION="${{ steps.tracked.outputs.truenas_version }}"
          fi
          RUNNER=$(.github/scripts/resolve-runner.sh "$TRAIN" "$VERSION")
          echo "runner=${RUNNER}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Single commit covering whichever fields moved. The state file is
      # rewritten in place; build.yml reads it at runtime so no workflow file
      # changes are needed.
      # -----------------------------------------------------------------------
      - name: Update tracked-versions
        id: write
        if: steps.truenas.outputs.changed == 'true' || steps.gasket.outputs.changed == 'true'
        env:
          TRUENAS_CHANGED: ${{ steps.truenas.outputs.changed }}
          NEW_TRUENAS_VERSION: ${{ steps.truenas.outputs.version }}
          NEW_TRAIN: ${{ steps.truenas.outputs.train }}
          CURRENT_TRAIN: ${{ steps.tracked.outputs.train }}
          GASKET_CHANGED: ${{ steps.gasket.outputs.changed }}
          NEW_GASKET_DRIVER: ${{ steps.gasket.outputs.driver }}
          NEW_GASKET_REF: ${{ steps.gasket.outputs.ref }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json, os
          with open('.github/tracked-versions.json') as f:
              s = json.load(f)
          if os.environ.get('TRUENAS_CHANGED') == 'true':
              s['truenas']['version'] = os.environ['NEW_TRUENAS_VERSION']
              s['truenas']['train']   = os.environ['NEW_TRAIN']
          if os.environ.get('GASKET_CHANGED') == 'true':
              s['gasket']['driver'] = os.environ['NEW_GASKET_DRIVER']
              s['gasket']['ref']    = os.environ['NEW_GASKET_REF']
          with open('.github/tracked-versions.json', 'w') as f:
              json.dump(s, f, indent=2)
              f.write('\n')
          PY

          # Build commit message from whichever fields moved
          PARTS=()
          if [ "$TRUENAS_CHANGED" = "true" ]; then
            if [ "$NEW_TRAIN" != "$CURRENT_TRAIN" ]; then
              PARTS+=("TrueNAS version to ${NEW_TRUENAS_VERSION} (train: ${NEW_TRAIN})")
            else
              PARTS+=("TrueNAS version to ${NEW_TRUENAS_VERSION}")
            fi
          fi
          if [ "$GASKET_CHANGED" = "true" ]; then
            PARTS+=("gasket-driver to ${NEW_GASKET_DRIVER}")
          fi
          MSG="Update tracked $(IFS=', '; echo "${PARTS[*]}")"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/tracked-versions.json
          git commit -m "$MSG" || {
            echo "ERROR: Failed to commit tracked-versions update"
            exit 1
          }
          # Retry once on push failure: if main moved (e.g. Dependabot merge)
          # between checkout and now, rebase on top and try again.
          if ! git push; then
            echo "Push failed, attempting rebase and retry..."
            git pull --rebase || {
              echo "::error title=Push failed::git pull --rebase failed after push rejection"
              exit 1
            }
            git push || {
              echo "::error title=Push failed::git push failed after rebase retry"
              exit 1
            }
          fi

          # Output final values (post-write) for the dispatch step
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          with open('.github/tracked-versions.json') as f:
              s = json.load(f)
          print(f"truenas_version={s['truenas']['version']}")
          print(f"train={s['truenas']['train']}")
          print(f"gasket_driver={s['gasket']['driver']}")
          print(f"gasket_ref={s['gasket']['ref']}")
          PY

      # -----------------------------------------------------------------------
      # Dispatch build.yml with the post-update values. mark_latest='false' is
      # the gate that prevents an unverified auto-build from displacing the
      # human-promoted Latest release.
      # -----------------------------------------------------------------------
      - name: Trigger build
        if: steps.truenas.outputs.changed == 'true' || steps.gasket.outputs.changed == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              ref: 'main',
              inputs: {
                truenas_version:      '${{ steps.write.outputs.truenas_version }}',
                gasket_driver_version: '${{ steps.write.outputs.gasket_driver }}',
                gasket_ref:           '${{ steps.write.outputs.gasket_ref }}',
                train_name:           '${{ steps.write.outputs.train }}',
                runner:               '${{ steps.runner.outputs.runner }}',
                mark_latest:          'false'
              }
            });
            console.log('Dispatched build.yml: TrueNAS ${{ steps.write.outputs.truenas_version }} (${{ steps.write.outputs.train }}), gasket ${{ steps.write.outputs.gasket_driver }}, runner ${{ steps.runner.outputs.runner }}');
